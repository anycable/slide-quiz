<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Quiz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/live-quiz@0.4/dist/participant.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="quiz-root"></div>
  <script type="module">
    import { createParticipantUI } from 'https://cdn.jsdelivr.net/npm/live-quiz@0.4/dist/participant.js';

    // Read config from URL params or use defaults matching slides.md
    const params = new URLSearchParams(window.location.search);
    const wsUrl = params.get('wsUrl') || 'wss://demo.anycable.io/cable';
    const quizGroupId = params.get('quizGroupId') || 'slidev-dev';

    createParticipantUI('#quiz-root', { wsUrl, quizGroupId });
  </script>
</body>
</html>
